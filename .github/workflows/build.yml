name: build

on:
push:
branches: [ "main", "master", "Test" ]
paths:
- "src/**"
- "*.sln"

pull_request:
branches: [ "main", "master", "Test" ]
paths:
- "src/**"
- "*.sln"

workflow_dispatch:

permissions:
contents: write

jobs:
build:
runs-on: windows-latest

```
steps:
  - name: Checkout
    uses: actions/checkout@v4
    with:
      fetch-depth: 0

  - name: Setup .NET
    uses: actions/setup-dotnet@v4
    with:
      dotnet-version: "8.0.x"

  - name: Restore
    run: dotnet restore .\VigemStickDriftUi.sln

  - name: Build
    run: dotnet build .\VigemStickDriftUi.sln --configuration Release --no-restore

  - name: Publish
    run: dotnet publish .\src\VigemStickDriftUi\VigemStickDriftUi.csproj --configuration Release --runtime win-x64 --self-contained false --output .\artifacts\publish

  - name: Upload artifact
    uses: actions/upload-artifact@v4
    with:
      name: VigemStickDriftUi-win-x64
      path: .\artifacts\publish\

  - name: Generate release tag
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    id: tag
    shell: pwsh
    run: |
      git fetch --tags

      $tags = @(git tag --list "v*" | Sort-Object {
        $t = [string]$_
        $t = $t.TrimStart('v')

        if ($t -eq "1") {
          [version]"1.0"
        } else {
          [version]$t
        }
      })

      if ($tags.Count -eq 0) {
        $newTag = "v1"
      } else {
        $latest = [string]($tags | Select-Object -Last 1)
        $ver = $latest -replace '^v', ''

        if ($ver -eq "1") {
          $newTag = "v1.1"
        } else {
          $parts = $ver.Split(".")
          $major = [int]$parts[0]
          $minor = [int]$parts[1]
          $minor++
          $newTag = "v$major.$minor"
        }
      }

      $zipName = "VigemStickDriftUi-win-x64-$newTag.zip"

      Compress-Archive -Path .\artifacts\publish\* -DestinationPath ".\artifacts\$zipName" -Force

      "tag_name=$newTag" >> $env:GITHUB_OUTPUT
      "zip_name=$zipName" >> $env:GITHUB_OUTPUT

  - name: Create GitHub Release
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    uses: softprops/action-gh-release@v2
    with:
      tag_name: ${{ steps.tag.outputs.tag_name }}
      name: Release ${{ steps.tag.outputs.tag_name }}
      generate_release_notes: true
      files: .\artifacts\${{ steps.tag.outputs.zip_name }}
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
```
